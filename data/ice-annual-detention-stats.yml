# Provenance metadata for ICE Annual Detention Facility Statistics (FY2019–FY2026)
# Eight annual Excel workbooks published by ICE on ice.gov, each containing a
# single "Facilities" worksheet with per-facility detention statistics.

source:
  title: "ICE Detention Facility Statistics"
  institution: "U.S. Immigration and Customs Enforcement (ICE), Enforcement and Removal Operations"
  publisher: "U.S. Department of Homeland Security"
  url_pattern: "https://www.ice.gov/doclib/detention/FY{nn}-detentionstats.xlsx"
  notes: >
    Annual workbooks reporting per-facility detention statistics including average
    daily population (ADP) by classification level, criminality, gender, and ICE
    threat level; average length of stay; facility type; inspection results; and
    guaranteed minimum bed capacity. Each file covers one fiscal year (Oct 1 –
    Sep 30), except FY25 and FY26 which are partial-year snapshots.

